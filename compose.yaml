volumes:
    go-tools-frontend-node_modules:
services:
    db:
        image: postgres
        container_name: go-tools-db
        env_file:
            - ./database/.env
        ports:
            - "5431:5432"
        volumes:
            - ./database:/var/lib/postgresql

    backend:
        build:
            context: ./backend
        container_name: go-tools-backend
        ports:
            - "8000:8000"

    frontend:
        build:
            context: ./frontend
        container_name: go-tools-frontend
        ports:
            - "3000:3000"
        depends_on:
            - backend
