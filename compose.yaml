volumes:
    go-tools-frontend-node_modules:
services:
    db:
        image: postgres
        container_name: go-tools-db
        env_file:
            - ./database/.env
        ports:
            - "5431:5432"
        volumes:
            - ./database:/var/lib/postgresql

    backend:
        build:
            context: ./backend
        container_name: go-tools-backend
        # GO's GTFS schedule times are agency-local (Eastern), and the backend
        # compares them against a naive datetime.now(). Without this the container
        # runs in UTC and evaluates the schedule ~4-5h off, so schedule-derived
        # line status (dimming out-of-service lines) is wrong. Pin to Eastern.
        environment:
            - TZ=America/Toronto
        ports:
            - "8000:8000"
        volumes:
            - ./backend/app/data/gtfs/raw:/app/app/data/gtfs/raw
            - ./backend/app/data/gtfs/shapes:/app/app/data/gtfs/shapes

    frontend:
        build:
            context: ./frontend
        container_name: go-tools-frontend
        ports:
            - "3000:3000"
        depends_on:
            - backend
